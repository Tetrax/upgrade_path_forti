name: Tests

# No real SMTP secrets, no Fortinet/PSIRT calls, no dependency on the real VPS or its data --
# scripts/fortios_server.py's FORTIOS_E2E_MOCK_NETWORK hook keeps the E2E suite fully offline,
# and the unittest suite already mocks smtplib/urllib entirely (see tests/*.py). This workflow
# never interpolates any event/PR/commit-controlled text into a run: step.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile all scripts
        run: python3 -m py_compile scripts/fortios_watch.py scripts/fortios_server.py scripts/fortios_notify.py scripts/import_forticlient_compat.py
      - name: Check deploy/install.sh syntax
        run: bash -n deploy/install.sh
      - name: Run unittest suite
        run: python3 -m unittest discover -s tests -v

  e2e-tests:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: python-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install E2E test dependencies
        run: pip install -r requirements-dev.txt
      - name: Install Playwright's Chromium only
        run: python3 -m playwright install --with-deps chromium
      - name: Run E2E suite
        run: python3 -m pytest tests/e2e/ -v
      - name: Upload traces/screenshots/videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            test-results/
            playwright-report/
          retention-days: 7
