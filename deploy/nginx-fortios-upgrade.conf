# FortiOS Upgrade Intelligence — HTTPS sur port 3001
server {
    listen 3001 ssl;
    server_name valdev.me www.valdev.me;

    ssl_certificate     /etc/letsencrypt/live/valdev.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/valdev.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # IP whitelist
    allow 5.226.1.2;
    allow 78.153.228.169;
    allow 86.193.239.40;
    deny  all;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
